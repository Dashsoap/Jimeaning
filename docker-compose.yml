services:
  mysql:
    image: mysql:8.0
    container_name: jimeaning-mysql
    environment:
      MYSQL_ROOT_PASSWORD: jimeaning123
      MYSQL_DATABASE: jimeaning
    ports:
      - "13306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jimeaning-redis
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jimeaning-app
    ports:
      - "13000:3000"
    environment:
      DATABASE_URL: "mysql://root:jimeaning123@mysql:3306/jimeaning"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      NEXTAUTH_URL: "http://localhost:13000"
      NEXTAUTH_SECRET: "docker-secret-change-in-production"
      API_ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      STORAGE_TYPE: "local"
      LOCAL_STORAGE_PATH: "/app/data"
      WORKER_IMAGE_CONCURRENCY: "50"
      WORKER_VIDEO_CONCURRENCY: "50"
      WORKER_VOICE_CONCURRENCY: "20"
      WORKER_TEXT_CONCURRENCY: "50"
    volumes:
      - ./data:/app/data
      - ./docker-logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "npx prisma db push --skip-generate && npm run start:all"

volumes:
  mysql_data:
  redis_data:
